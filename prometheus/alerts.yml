groups:
  - name: infra-alerts
    rules:
      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.server_name }} DOWN"
          description: "Le node exporter de {{ $labels.server_name }} ({{ $labels.instance }}) ne répond plus depuis 1 minute."

      - alert: PantheraRuntimeNotStarted
        expr: panthera_runtime_enabled{job="panthera"} == 1 and panthera_runtime_started{job="panthera"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.server_name }} runtime not started"
          description: "Le runtime Panthera est activé mais n'a pas démarré correctement."

      - alert: PantheraStartupErrors
        expr: panthera_startup_errors{job="panthera"} > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.server_name }} startup errors"
          description: "Panthera a enregistré des erreurs au démarrage."

      - alert: PantheraDetectorHasError
        expr: panthera_detector_has_error{job="panthera"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.server_name }} detector error"
          description: "Le backend de détection Panthera signale une erreur."
